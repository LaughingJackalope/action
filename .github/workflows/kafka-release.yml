name: Build and Release Apache Kafka from Source

on:
  workflow_dispatch:
    inputs:
      kafka_version:
        description: 'Apache Kafka version to build (e.g., 3.7.0)'
        required: true
        type: string

# Minimal permissions for security and compliance
# - contents:write: Required to create GitHub Releases
# - packages:write: Required if publishing to GitHub Packages
permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build and Release Kafka ${{ github.event.inputs.kafka_version }}
    runs-on: ubuntu-latest
    
    steps:
      # ============================================================================
      # STEP 1: Check out Apache Kafka source at the specified release tag
      # Purpose: Establish exact source provenance for regulatory audit trail
      # ============================================================================
      - name: Checkout Apache Kafka source
        uses: actions/checkout@v4
        with:
          repository: apache/kafka
          ref: ${{ github.event.inputs.kafka_version }}
          fetch-depth: 0
          fetch-tags: true

      # ============================================================================
      # STEP 2: Set up JDK 17 (Eclipse Temurin distribution)
      # Purpose: Use a vendor-supported, open-source JDK for reproducible builds
      # ============================================================================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ============================================================================
      # STEP 3: Capture build environment details for audit trail
      # Purpose: Document exact build environment for compliance verification
      # ============================================================================
      - name: Capture build environment
        id: env_capture
        run: |
          echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV
          echo "JDK_VERSION=$(java -version 2>&1 | head -n 1)" >> $GITHUB_ENV
          echo "JDK_VENDOR=$(java -version 2>&1 | grep -i 'vendor' | head -n 1 || echo 'Eclipse Temurin (from setup-java)')" >> $GITHUB_ENV
          echo "RUNNER_OS=${{ runner.os }}" >> $GITHUB_ENV
          echo "RUNNER_ARCH=${{ runner.arch }}" >> $GITHUB_ENV
          echo "SOURCE_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          echo "SOURCE_COMMIT_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # ============================================================================
      # STEP 4: Build Kafka from source
      # Purpose: Compile official Apache Kafka release from verified source
      # ============================================================================
      - name: Build Kafka
        run: |
          echo "Starting Kafka build for version ${{ github.event.inputs.kafka_version }}"
          echo "Source commit: ${{ env.SOURCE_COMMIT }}"
          ./gradlew clean build --no-daemon -x test 2>&1 | tee build-output.log
        timeout-minutes: 45

      # ============================================================================
      # STEP 5: Generate Software Bill of Materials (SBOM)
      # Purpose: Create compliance artifact for software supply chain transparency
      # Tool: Syft (open-source SBOM generator from Anchore)
      # ============================================================================
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: |
          syft . --output spdx-json=kafka-sbom-${{ github.event.inputs.kafka_version }}.json
          syft . --output cyclonedx-json=kafka-sbom-${{ github.event.inputs.kafka_version }}-cyclonedx.json
          echo "SBOM files generated:"
          ls -la kafka-sbom-*

      # ============================================================================
      # STEP 6: Create detailed build report for audit trail
      # Purpose: Provide human-readable documentation of build provenance
      # ============================================================================
      - name: Generate build report
        run: |
          cat > BUILD-REPORT-${{ github.event.inputs.kafka_version }}.txt << 'EOF'
          ===========================================================================
          APACHE KAFKA SOURCE BUILD - COMPLIANCE REPORT
          ===========================================================================
          
          BUILD IDENTIFICATION
          --------------------
          Source Repository:      apache/kafka
          Release Tag/Version:  ${{ github.event.inputs.kafka_version }}
          Source Commit Hash:   ${{ env.SOURCE_COMMIT }}
          Build Timestamp:      ${{ env.BUILD_DATE }}
          GitHub Run ID:        ${{ github.run_id }}
          GitHub Run Number:    ${{ github.run_number }}
          
          BUILD ENVIRONMENT
          -----------------
          JDK Version:          ${{ env.JDK_VERSION }}
          JDK Vendor:           ${{ env.JDK_VENDOR }}
          Runner OS:            ${{ env.RUNNER_OS }} ${{ env.RUNNER_ARCH }}
          
          SOURCE PROVENANCE
          -----------------
          This build was compiled from the official Apache Kafka source code
          obtained directly from the apache/kafka GitHub repository.
          
          The exact source commit used: ${{ env.SOURCE_COMMIT }} (short: ${{ env.SOURCE_COMMIT_SHORT }})
          This commit corresponds to the Git tag: ${{ github.event.inputs.kafka_version }}
          
          VERIFICATION INSTRUCTIONS
          -------------------------
          To verify the source provenance of this build:
          1. Clone the Apache Kafka repository: git clone https://github.com/apache/kafka.git
          2. Checkout the exact commit: git checkout ${{ env.SOURCE_COMMIT }}
          3. Verify the tag: git tag -v ${{ github.event.inputs.kafka_version }} (if signed)
          4. Compare build outputs with the artifacts in this release
          
          COMPLIANCE STATEMENT
          --------------------
          This build was produced using automated CI/CD with complete audit logging.
          All build inputs, environment details, and outputs are documented herein.
          The SBOM (Software Bill of Materials) is attached for dependency analysis.
          
          Generated by GitHub Actions workflow: ${{ github.workflow }}
          Workflow SHA: ${{ github.sha }}
          
          ===========================================================================
          END OF BUILD REPORT
          ===========================================================================
          EOF
          
          echo "Build report generated:"
          cat BUILD-REPORT-${{ github.event.inputs.kafka_version }}.txt

      # ============================================================================
      # STEP 7: Upload build artifacts for release
      # Purpose: Preserve build outputs and compliance documentation
      # ============================================================================
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kafka-build-${{ github.event.inputs.kafka_version }}
          path: |
            BUILD-REPORT-${{ github.event.inputs.kafka_version }}.txt
            kafka-sbom-${{ github.event.inputs.kafka_version }}.json
            kafka-sbom-${{ github.event.inputs.kafka_version }}-cyclonedx.json
            build-output.log
            core/build/libs/*.jar
            clients/build/libs/*.jar
            streams/build/libs/*.jar
            connect/*/build/libs/*.jar
            **/build/distributions/*.tgz
            **/build/distributions/*.zip
          if-no-files-found: warn
          retention-days: 90

      # ============================================================================
      # STEP 8: Create GitHub Release with all artifacts
      # Purpose: Establish immutable source of truth for built artifacts
      # ============================================================================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: kafka-${{ github.event.inputs.kafka_version }}
          name: Apache Kafka ${{ github.event.inputs.kafka_version }} (Source Build)
          body: |
            ## Apache Kafka ${{ github.event.inputs.kafka_version }} - Source Build
            
            This release contains Kafka ${{ github.event.inputs.kafka_version }} built from the official Apache source.
            
            ### Source Provenance
            - **Source Repository:** https://github.com/apache/kafka
            - **Source Tag:** `${{ github.event.inputs.kafka_version }}`
            - **Source Commit:** `${{ env.SOURCE_COMMIT }}`
            
            ### Build Details
            - **Build Date:** ${{ env.BUILD_DATE }}
            - **JDK:** ${{ env.JDK_VERSION }}
            - **JDK Vendor:** ${{ env.JDK_VENDOR }}
            - **Runner OS:** ${{ env.RUNNER_OS }} ${{ env.RUNNER_ARCH }}
            
            ### Compliance & Audit
            - Build report and SBOM are included for regulatory inspection
            - Full audit trail available in GitHub Actions logs
            - Source can be verified against Apache Kafka official repository
            
            ### Files Included
            - `BUILD-REPORT-*.txt` - Detailed build and provenance information
            - `kafka-sbom-*.json` - Software Bill of Materials (SPDX & CycloneDX formats)
            - Compiled Kafka binaries and distributions
            
            ---
            *This release was generated automatically via GitHub Actions for compliance and traceability.*
          files: |
            BUILD-REPORT-${{ github.event.inputs.kafka_version }}.txt
            kafka-sbom-${{ github.event.inputs.kafka_version }}.json
            kafka-sbom-${{ github.event.inputs.kafka_version }}-cyclonedx.json
            build-output.log
            core/build/libs/*.jar
            clients/build/libs/*.jar
            streams/build/libs/*.jar
            connect/*/build/libs/*.jar
            **/build/distributions/*.tgz
            **/build/distributions/*.zip
          fail_on_unmatched_files: false

      # ============================================================================
      # STEP 9: Output summary for workflow visibility
      # Purpose: Provide immediate feedback in GitHub Actions UI
      # ============================================================================
      - name: Output build summary
        run: |
          echo "::group::Build Summary"
          echo "✅ Kafka ${{ github.event.inputs.kafka_version }} build complete"
          echo "📦 Source Commit: ${{ env.SOURCE_COMMIT }}"
          echo "🏷️  Release Tag: kafka-${{ github.event.inputs.kafka_version }}"
          echo "📄 Build Report: BUILD-REPORT-${{ github.event.inputs.kafka_version }}.txt"
          echo "🔍 SBOM Files: kafka-sbom-${{ github.event.inputs.kafka_version }}.json"
          echo "::endgroup::"
